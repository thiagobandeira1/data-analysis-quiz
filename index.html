// RENDERING
// =============================================================
const SECTIONS_ORDER = ["mlr","anova","logistic","poisson","nonparam","power","pca","regularized","survival","clustering"];
const state = {
  mode: "home",           // home | quiz | done
  bank: "base",           // base | all (extended) | prof (professor sample)
  sectionKey: null,
  shuffle: true,          // shuffle question order
  shuffleOpts: true,      // shuffle A/B/C/D position within each question
  questions: [],
  idx: 0,
  answers: [],            // {chosen, correct}
};

function shuffleArr(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Randomize which position (A/B/C/D) the correct answer sits in,
// so the "longest-answer-is-right" pattern is destroyed.
function shuffleOptions(q){
  const n = q.options.length;
  const order = shuffleArr([...Array(n).keys()]);
  const newOptions = order.map(i => q.options[i]);
  const newCorrect = order.indexOf(q.correct);
  // Re-label A/B/C/D so labels stay in order visually
  const relabeled = newOptions.map((opt, i) => {
    const stripped = opt.replace(/^[A-D]\)\s*/, '');
    return String.fromCharCode(65 + i) + ') ' + stripped;
  });
  return { ...q, options: relabeled, correct: newCorrect };
}

function h(html){ document.getElementById("app").innerHTML = html; }

function bankSize(b, mode){
  if(mode === "base") return b.base.length;
  if(mode === "all")  return b.base.length + (b.bonus?b.bonus.length:0);
  if(mode === "prof") return b.prof ? b.prof.length : 0;
  return 0;
}

function renderHome(){
  const m = state.bank;
  h(`
    <div class="topbar"><div>Claude Practice · user-generated</div><div></div></div>
    <div class="title-eyebrow">Final Exam</div>
    <h1>Practice Quiz</h1>
    <div class="subtitle">Choose a question bank and section.</div>
    <div class="tabs" style="grid-template-columns:1fr 1fr 1fr">
      <div class="tab ${m==='base'?'active':''}" onclick="pick('base')">Original (20/sec)</div>
      <div class="tab ${m==='all'?'active':''}"  onclick="pick('all')">Extended (+bonus)</div>
      <div class="tab ${m==='prof'?'active':''}" onclick="pick('prof')">Prof Sample</div>
    </div>
    <label class="toggle"><input type="checkbox" ${state.shuffle?'checked':''} onchange="state.shuffle=this.checked">Shuffle question order</label>
    <label class="toggle"><input type="checkbox" ${state.shuffleOpts?'checked':''} onchange="state.shuffleOpts=this.checked">Shuffle answer options (A/B/C/D)</label>
    <div class="section-list">
      ${SECTIONS_ORDER.map((k,i)=>{
        const b = BANKS[k];
        const n = bankSize(b, m);
        const dim = n===0 ? 'style="opacity:.4;cursor:not-allowed"' : '';
        const click = n===0 ? '' : `onclick="startQuiz('${k}')"`;
        return `<div class="section-card" ${dim} ${click}>
          <h3>Section ${i+1}: ${b.name}</h3>
          <div class="count">${n} questions${n===0?' (none in this tab)':''}</div>
        </div>`;
      }).join("")}
    </div>
    <div style="margin-top:40px;color:var(--dim);font-size:12px;text-align:center">
      Original 200 MC · Extended +50 R-output · Prof Sample 190 exam-style MC
    </div>
  `);
}
window.pick = function(b){ state.bank=b; renderHome(); };

function startQuiz(key){
  state.sectionKey = key;
  state.idx = 0;
  state.answers = [];
  const bank = BANKS[key];
  let qs;
  if(state.bank === "prof"){
    qs = (bank.prof || []).slice();
  } else {
    qs = bank.base.slice();
    if(state.bank === "all" && bank.bonus) qs = qs.concat(bank.bonus);
  }
  if(qs.length === 0) return;
  if(state.shuffle) qs = shuffleArr(qs);
  if(state.shuffleOpts) qs = qs.map(shuffleOptions);
  state.questions = qs;
  state.mode = "quiz";
  renderQuiz();
}
window.startQuiz = startQuiz;

function renderQuiz(){
  const q = state.questions[state.idx];
  const ans = state.answers[state.idx];
  const locked = !!ans;
  const pct = ((state.idx)/state.questions.length)*100;
  h(`
    <div class="topbar">
      <div><a style="color:var(--dim);cursor:pointer" onclick="goHome()">← Sections</a></div>
      <div>${BANKS[state.sectionKey].name}</div>
    </div>
    <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
    <div class="qmeta"><span>Question ${state.idx+1} of ${state.questions.length}</span><span>Score: ${state.answers.filter(a=>a&&a.correct).length} / ${state.answers.length}</span></div>
    <div class="qbox">
      <div class="qtext">${q.q}</div>
      ${q.output?`<div class="routput">${q.output}</div>`:""}
      <div class="opts">
        ${q.options.map((opt,i)=>{
          let cls = "opt";
          if(locked){
            cls += " locked";
            if(i === q.correct) cls += " correct";
            else if(i === ans.chosen) cls += " wrong";
          } else if(ans && ans.chosen === i){ cls += " chosen"; }
          return `<div class="${cls}" onclick="${locked?'':'choose('+i+')'}">${opt}</div>`;
        }).join("")}
      </div>
      ${locked?`<div class="explain"><strong>${ans.correct?'✓ Correct':'✗ Incorrect'}.</strong> ${q.explain}</div>`:""}
    </div>
    <div class="nav">
      <button ${state.idx===0?'disabled':''} onclick="prev()">← Prev</button>
      ${state.idx === state.questions.length-1
        ? `<button class="primary" ${!locked?'disabled':''} onclick="finish()">Finish</button>`
        : `<button class="primary" ${!locked?'disabled':''} onclick="next()">Next →</button>`}
    </div>
  `);
}
window.choose = function(i){
  const q = state.questions[state.idx];
  state.answers[state.idx] = { chosen:i, correct: i === q.correct };
  renderQuiz();
};
window.next = function(){ state.idx++; renderQuiz(); };
window.prev = function(){ state.idx--; renderQuiz(); };
window.finish = function(){ state.mode="done"; renderDone(); };
window.goHome = function(){ state.mode="home"; renderHome(); };

function renderDone(){
  const score = state.answers.filter(a=>a&&a.correct).length;
  const total = state.questions.length;
  const pct = Math.round(score/total*100);
  h(`
    <div class="topbar"><div></div><div></div></div>
    <div class="finish">
      <div class="title-eyebrow">${BANKS[state.sectionKey].name}</div>
      <h2>Quiz Complete</h2>
      <div class="score">${score} / ${total}</div>
      <div class="pct">${pct}%</div>
      <div style="margin-top:30px;display:flex;gap:10px;justify-content:center">
        <button onclick="startQuiz('${state.sectionKey}')">Retry Section</button>
        <button class="primary" onclick="goHome()">Back to Sections</button>
      </div>
    </div>
  `);
}

renderHome();
</script>
</body>
</html>
