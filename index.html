<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Final Exam Practice Quiz</title>
<style>
  :root{
    --bg:#14151a;
    --panel:#1c1e26;
    --panel2:#24262f;
    --text:#e7e7ea;
    --dim:#9ca0aa;
    --accent:#8cbfff;
    --accent2:#2a3a5c;
    --ok:#63d08a;
    --bad:#f47272;
    --border:#2d2f3a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Consolas','Courier New',monospace;}
  body{min-height:100vh;padding:40px 20px;display:flex;justify-content:center}
  .wrap{width:100%;max-width:760px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;color:var(--dim);font-size:13px}
  .title-eyebrow{color:var(--dim);letter-spacing:3px;font-size:12px;text-transform:uppercase;margin-bottom:8px}
  h1{font-size:42px;margin:0 0 8px 0;font-family:'Consolas','Courier New',monospace}
  .subtitle{color:var(--dim);margin-bottom:32px}
  .tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--panel);border-radius:10px;padding:6px;margin-bottom:24px}
  .tab{padding:12px;text-align:center;border-radius:8px;cursor:pointer;color:var(--dim);user-select:none}
  .tab.active{background:var(--accent);color:#0c1222;font-weight:bold}
  .toggle{display:flex;align-items:center;gap:10px;margin-bottom:20px;cursor:pointer}
  .toggle input{accent-color:var(--accent);transform:scale(1.2)}
  .section-list{display:flex;flex-direction:column;gap:12px}
  .section-card{background:var(--panel);padding:22px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .15s}
  .section-card:hover{border-color:var(--accent);background:var(--panel2)}
  .section-card h3{margin:0 0 6px 0;font-size:18px;font-weight:bold}
  .section-card .count{color:var(--dim);font-size:13px}
  .qbox{background:var(--panel);border-radius:10px;padding:28px;margin-top:16px}
  .qmeta{color:var(--dim);font-size:13px;margin-bottom:14px;display:flex;justify-content:space-between}
  .qtext{font-size:16px;line-height:1.55;margin-bottom:18px;white-space:pre-wrap}
  .routput{background:#0e0f13;border:1px solid var(--border);border-radius:6px;padding:12px;font-size:12.5px;white-space:pre;overflow-x:auto;margin:12px 0;color:#c7cbd1}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .1s;font-size:14.5px;line-height:1.45}
  .opt:hover{border-color:var(--accent)}
  .opt.chosen{border-color:var(--accent);background:var(--accent2)}
  .opt.correct{border-color:var(--ok);background:rgba(99,208,138,.14)}
  .opt.wrong{border-color:var(--bad);background:rgba(244,114,114,.14)}
  .opt.locked{cursor:default}
  .explain{margin-top:16px;padding:14px;background:#0e0f13;border-left:3px solid var(--accent);border-radius:4px;font-size:13.5px;line-height:1.55;color:#d0d4dc}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:10px}
  button{background:var(--panel2);color:var(--text);border:1px solid var(--border);padding:11px 22px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:14px}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);color:#0c1222;font-weight:bold;border-color:var(--accent)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .progress{height:4px;background:var(--panel2);border-radius:2px;overflow:hidden;margin-bottom:18px}
  .progress .bar{height:100%;background:var(--accent);transition:width .3s}
  .finish{text-align:center;padding:40px 20px}
  .finish h2{font-size:36px;margin:10px 0}
  .finish .score{font-size:60px;color:var(--accent);margin:18px 0;font-weight:bold}
  .finish .pct{color:var(--dim);font-size:16px}
  code{background:#0e0f13;padding:1px 6px;border-radius:3px;font-size:.95em;color:#d4dcec}
  .topic{display:inline-block;background:var(--accent2);color:var(--accent);font-size:11px;padding:3px 10px;border-radius:10px;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// =============================================================
//  QUESTION BANKS
//  Each section has `base` (20 MC) and `bonus` (5 R-output MC).
//  fields per question: q, options[4], correct (0..3), explain,
//                       (optional) output = R output block
// =============================================================
const BANKS = {
  mlr: {
    name: "Multiple Regression",
    base: [
      {q:"Which is the correct R function to fit a multiple LINEAR regression with continuous Y?",options:["A) glm(Y ~ X, family=binomial)","B) lm(Y ~ X1 + X2, data=data)","C) aov(Y ~ X1 * X2)","D) glm(Y ~ X, family=poisson)"],correct:1,explain:"lm() is used for continuous Y. glm(..., binomial) is logistic; glm(..., poisson) is for counts; aov() is for ANOVA."},
      {q:"The formula <code>lm(Y ~ . - CatVar, data=data)</code> means:",options:["A) Fit Y against CatVar only","B) Fit Y against ALL predictors except CatVar","C) Fit Y without an intercept","D) Drop Y from the model"],correct:1,explain:"`.` means all columns; `- CatVar` excludes that column from the predictors."},
      {q:"Adjusted R-squared differs from R-squared because:",options:["A) Adj R² is always larger than R²","B) Adj R² penalizes adding predictors that don't improve the fit; it can DECREASE when useless predictors are added","C) They are identical","D) Adj R² is computed on test data"],correct:1,explain:"R² always rises (or stays) when predictors are added. Adj R² penalizes complexity and can drop if a predictor doesn't add value."},
      {q:"<code>predict(model, newdata, interval=\"prediction\")</code> vs <code>interval=\"confidence\"</code>:",options:["A) Prediction interval is narrower than confidence interval","B) They are the same","C) Prediction interval is WIDER; it adds individual-observation variability on top of mean uncertainty","D) Confidence interval is for new predictions"],correct:2,explain:"CI is for the mean response; PI is for a single new observation and includes extra variability, hence always wider."},
      {q:"<code>anova(reduced, full)</code> tests:",options:["A) Whether each coefficient is zero","B) Whether the full (larger) model is significantly better than the reduced (nested) model","C) Homoscedasticity","D) Normality of residuals"],correct:1,explain:"It performs a partial F-test for nested models. p < 0.05 → keep the full model. Models MUST be nested."},
      {q:"VIF = 12.5 for a predictor indicates:",options:["A) The predictor is perfectly independent","B) Serious multicollinearity (VIF>10); consider dropping, combining, or Ridge/Lasso","C) The predictor is statistically significant","D) The model has a large R²"],correct:1,explain:"VIF thresholds: 1-5 acceptable, 5-10 potential, >10 serious. High VIF inflates SEs."},
      {q:"Cook's Distance for observation #42 is 2.1. What does this mean?",options:["A) The observation has an unusual X value only","B) The observation is strongly influential: removing it would substantially change the fitted regression","C) The observation should always be deleted","D) Cook's D > 1 means the model is perfect"],correct:1,explain:"Cook's D > 1 is an influential observation (combines leverage and residual magnitude). Investigate; don't blindly delete."},
      {q:"A categorical predictor with 5 levels creates how many dummy variables in lm()?",options:["A) 5","B) 4 (k − 1)","C) 1","D) 10"],correct:1,explain:"With k levels, (k−1) dummies are created; one level is the reference."},
      {q:"If <code>data$Region</code> = factor with levels (North, South, East, West) and \"North\" is reference, the coefficient <code>RegionSouth = 500</code> means:",options:["A) South has mean 500 for Y","B) South's mean Y is 500 units HIGHER than North's mean Y (holding other predictors fixed)","C) South adds 500 to the intercept for everyone","D) North is 500 units higher than South"],correct:1,explain:"Dummy coefficients = difference in mean Y vs. the reference level, with other predictors held constant."},
      {q:"Calling <code>step(full_model)</code> by default uses which criterion?",options:["A) BIC","B) AIC (k = 2)","C) Adjusted R²","D) p-value"],correct:1,explain:"step() uses AIC by default (k=2). Use k=log(n) to switch to BIC."},
      {q:"Compared to AIC, BIC:",options:["A) Always selects the same model","B) Penalizes complexity LESS","C) Penalizes complexity MORE (k=log(n)), tending to select smaller models","D) Cannot be used for GLMs"],correct:2,explain:"BIC uses log(n) instead of 2 as the penalty. For n>7, log(n)>2 so BIC favors smaller models."},
      {q:"The Residuals vs Fitted plot is primarily used to check:",options:["A) Normality of the response","B) Linearity and homoscedasticity (look for random scatter, no pattern)","C) Sample size","D) Multicollinearity"],correct:1,explain:"A trumpet / curve pattern signals non-linearity or non-constant variance. Q-Q plot checks normality instead."},
      {q:"A Q-Q plot of residuals shows points curving away from the line at both ends. This suggests:",options:["A) Residuals are exactly normal","B) Heavy tails (non-normality); formal tests or robust methods may be warranted","C) Perfect linearity","D) The intercept is wrong"],correct:1,explain:"S-shaped or curved Q-Q plots indicate non-normal residuals (heavy or light tails)."},
      {q:"Homoscedasticity means:",options:["A) The residuals are normally distributed","B) Constant variance of residuals across fitted values","C) Predictors are uncorrelated","D) The model has no intercept"],correct:1,explain:"Homoscedasticity = equal variance. Heteroscedasticity (funnel shapes) violates OLS assumptions."},
      {q:"Test MSE is a better quality indicator than training MSE because:",options:["A) Test MSE is smaller","B) Training MSE can be made arbitrarily small by overfitting; test MSE reflects generalization","C) Training MSE is biased upward","D) They are equal"],correct:1,explain:"Complex models can memorize training data (low training MSE) but fail on new data. Always evaluate on held-out data."},
      {q:"<code>lm(Y ~ X1 * X2)</code> is shorthand for:",options:["A) Y ~ X1 + X2 only","B) Y ~ X1 + X2 + X1:X2 (main effects plus interaction)","C) Y ~ X1 * X2 as a product only","D) Y ~ X1 / X2"],correct:1,explain:"In R, * expands to both main effects and their interaction. Use : for the interaction only."},
      {q:"Why create <code>x = model.matrix(Y ~ ., data)[,-1]</code> for glmnet?",options:["A) To remove NA rows","B) glmnet needs a numeric matrix (not a data frame or formula); model.matrix builds dummies for factors and the [,-1] drops the intercept column","C) To sort the columns","D) To standardize"],correct:1,explain:"glmnet cannot accept formulas; it needs a numeric X matrix. model.matrix handles categorical variable encoding."},
      {q:"If F-statistic for a multiple regression has p < 0.001, this means:",options:["A) Every predictor is significant","B) At least ONE predictor has a non-zero coefficient","C) R² equals 1","D) No predictor is significant"],correct:1,explain:"The F-test checks H0: all slopes = 0. Rejecting it means at least one slope is nonzero — not that all are."},
      {q:"A 95% confidence interval for a slope that contains 0 indicates:",options:["A) The slope is significantly different from zero at α=0.05","B) The slope is NOT significantly different from zero at α=0.05 (same conclusion as p > 0.05)","C) The predictor must be removed","D) The model is wrong"],correct:1,explain:"CI containing 0 and p ≥ 0.05 are equivalent statements."},
      {q:"Outliers and leverage: which combination is the MOST concerning?",options:["A) Low leverage and small residual","B) High leverage with large residual (= high influence; Cook's D usually large)","C) High leverage alone","D) Small residual alone"],correct:1,explain:"Leverage = unusual X. Outlier = unusual Y. Together = influential. A lone high-leverage point with a small residual may be harmless."}
    ],
    bonus: [
      {q:"Given this output, what is the predicted Y when X1=3 and X2=2?",output:"## Coefficients:\n##             Estimate\n## (Intercept)   5.00\n## X1            1.50\n## X2           -0.80",options:["A) 6.9","B) 7.9","C) 9.5","D) 4.5"],correct:1,explain:"Y_hat = 5 + 1.5(3) + (−0.8)(2) = 5 + 4.5 − 1.6 = 7.9."},
      {q:"<code>vif(model)</code> returns: X1=1.3, X2=9.2, X3=14.5, X4=2.1. What should you do?",options:["A) Drop X1 (VIF too small)","B) Address X3 (VIF>10 = serious); consider Ridge/Lasso or removing a correlated variable","C) Drop all four and refit with no predictors","D) Nothing; these are all acceptable"],correct:1,explain:"Only X3 exceeds 10. Low VIFs indicate uncorrelated predictors — those are fine."},
      {q:"<code>cooks.distance(model)</code> shows obs 34 with value 1.48. Best action:",options:["A) Delete obs 34 immediately","B) Investigate obs 34 (data-entry error? legitimate extreme? refit with/without to check sensitivity)","C) Ignore — Cook's D is meaningless","D) Multiply all responses by a constant"],correct:1,explain:"Cook's D > 1 = highly influential. Investigate before deleting; the point may be a genuine but extreme observation."},
      {q:"<code>anova(reduced, full)</code> returns F=4.12, p=0.018. What do you conclude?",options:["A) Keep the reduced model","B) Keep the FULL model — the added predictors jointly improve fit at α=0.05","C) Both models are equivalent","D) anova requires p > 0.05 to keep full"],correct:1,explain:"p < 0.05 → reject H0 (no improvement). The extra predictors add significant explanatory power."},
      {q:"<code>step(full_model, k=log(nrow(data)))</code> retains 4 of 10 predictors. This is:",options:["A) A Forward-selection model with AIC","B) BIC-based stepwise selection (k=log(n)); stricter than AIC, often yielding a smaller model","C) A non-regularized OLS fit","D) A regression with no intercept"],correct:1,explain:"k=log(n) converts step() to BIC. BIC's heavier penalty leads to smaller models."}
    ],
    prof: [
      {q:"The goal of linear regression is to:",options:["A) Classify data","B) Model relationship between variables","C) Reduce dimensionality","D) Rank observations"],correct:1,explain:"Linear regression models the relationship between predictors and a continuous response variable."},
      {q:"In simple linear regression, the model is:",options:["A) y = β₀ + β₁x + ε","B) y = x² + ε","C) log(y) = x","D) y = ε"],correct:0,explain:"Standard linear regression equation with an error term."},
      {q:"The term ε (epsilon) represents:",options:["A) Coefficient","B) Predictor","C) Random error","D) Mean"],correct:2,explain:"ε captures random variation not explained by the model."},
      {q:"The method used to estimate coefficients is:",options:["A) Maximum likelihood only","B) Least squares","C) Gradient descent","D) PCA"],correct:1,explain:"Coefficients are estimated by minimizing the sum of squared errors (OLS)."},
      {q:"Residuals are defined as:",options:["A) Predicted − observed","B) Observed − predicted","C) Mean − predicted","D) Variance − mean"],correct:1,explain:"Residual = actual value minus predicted value."},
      {q:"The objective of least squares is to minimize:",options:["A) Sum of residuals","B) Sum of squared residuals","C) Mean of residuals","D) Variance"],correct:1,explain:"Squaring makes values positive and penalizes large errors."},
      {q:"R-squared represents:",options:["A) Total variance","B) Residual variance","C) Proportion of variance explained","D) Mean error"],correct:2,explain:"R² measures how well the model explains variability in Y."},
      {q:"R-squared ranges between:",options:["A) −1 and 1","B) 0 and 1","C) 0 and ∞","D) −∞ and ∞"],correct:1,explain:"R² is bounded between 0 (no fit) and 1 (perfect fit)."},
      {q:"A higher R-squared indicates:",options:["A) Worse model","B) Better fit","C) More bias","D) Smaller sample"],correct:1,explain:"Higher R² means more variance explained."},
      {q:"Adjusted R-squared differs because it:",options:["A) Always increases","B) Penalizes adding unnecessary predictors","C) Ignores predictors","D) Measures variance only"],correct:1,explain:"Adjusts for number of predictors to prevent overfitting."},
      {q:"In multiple regression, we have:",options:["A) One predictor","B) Two responses","C) Multiple predictors","D) No predictors"],correct:2,explain:"Multiple regression uses several independent variables."},
      {q:"Multicollinearity occurs when:",options:["A) Variables are independent","B) Predictors are highly correlated","C) Errors are large","D) Sample size is small"],correct:1,explain:"Multicollinearity = strong correlation among predictors."},
      {q:"Multicollinearity mainly affects:",options:["A) Predictions only","B) Coefficient stability","C) Sample size","D) Residuals"],correct:1,explain:"Leads to unstable / unreliable coefficient estimates."},
      {q:"The assumptions of linear regression include:",options:["A) Independence, normality, constant variance","B) Only normality","C) Only independence","D) Only constant variance"],correct:0,explain:"Key assumptions: independence, normality of errors, homoscedasticity."},
      {q:"Homoscedasticity means:",options:["A) Equal means","B) Equal variances of errors","C) Independent predictors","D) Normal distribution"],correct:1,explain:"Constant variance of residuals across levels of X."},
      {q:"If variance of errors changes, this is called:",options:["A) Multicollinearity","B) Heteroscedasticity","C) Normality","D) Independence"],correct:1,explain:"Unequal variance is heteroscedasticity."},
      {q:"The p-value for a coefficient tests:",options:["A) Whether variance is zero","B) Whether coefficient equals zero","C) Whether residuals are normal","D) Whether R² is large"],correct:1,explain:"Tests H₀: β = 0 (no effect)."},
      {q:"A small p-value indicates:",options:["A) Weak evidence","B) Strong evidence against H₀","C) Large variance","D) Poor fit"],correct:1,explain:"Small p → reject null hypothesis."},
      {q:"Outliers can affect regression by:",options:["A) Improving fit","B) Changing coefficient estimates","C) Reducing variance","D) Increasing R² always"],correct:1,explain:"Outliers can heavily influence the regression line."},
      {q:"The difference between correlation and regression is:",options:["A) No difference","B) Correlation implies causation","C) Regression models relationships, correlation measures strength only","D) Regression measures only variance"],correct:2,explain:"Correlation measures association strength; regression models the relationship."}
    ]
  },
  anova: {
    name: "Two-Way ANOVA",
    base: [
      {q:"In <code>aov(Y ~ F1 * F2)</code>, the * symbol means:",options:["A) F1 times F2 (multiplication)","B) F1 + F2 + F1:F2 (main effects + interaction)","C) Interaction only","D) Excludes F2"],correct:1,explain:"* expands to both main effects and the interaction. Use + for main-effects-only; : for the interaction alone."},
      {q:"A two-way ANOVA has a significant F1×F2 interaction (p=0.003). What should you do?",options:["A) Interpret F1 and F2 main effects directly","B) Do NOT interpret main effects alone; examine simple effects with emmeans","C) Drop both factors","D) Switch to a one-way ANOVA"],correct:1,explain:"Main effects average over levels of the other factor. When interaction exists, that average is misleading — analyze within-level (simple) effects."},
      {q:"Parallel lines on an interaction plot indicate:",options:["A) A strong interaction","B) NO interaction (main effects can be interpreted directly)","C) A violation of normality","D) Missing data"],correct:1,explain:"Parallel = effect of one factor is consistent across levels of the other = no interaction."},
      {q:"<code>TukeyHSD(m, which=\"F1\")</code> gives a CI of (-1.2, 2.5) for one pair. This means:",options:["A) The two levels differ significantly","B) The CI contains 0 → no significant difference at the specified family-wise α","C) The test failed","D) The CI is wrong"],correct:1,explain:"CI containing 0 ⇔ adj p > 0.05. Tukey HSD accounts for all pairwise comparisons simultaneously."},
      {q:"Before running aov(), both grouping variables should be:",options:["A) Numeric","B) Converted to factors via <code>factor()</code> or <code>as.factor()</code>","C) Removed","D) Standardized"],correct:1,explain:"aov() treats numeric variables as continuous. factor() ensures they're treated as categorical."},
      {q:"The total number of hypotheses tested in a two-way ANOVA with interaction is:",options:["A) 1","B) 2","C) 3 (main effect F1, main effect F2, interaction F1:F2)","D) 4"],correct:2,explain:"Three separate F-tests: F1, F2, and F1:F2."},
      {q:"A simple effect is:",options:["A) A main effect averaged across levels of the other factor","B) The effect of one factor WITHIN a specific level of the other factor","C) Always equal to the main effect","D) Only computed when interaction is NOT significant"],correct:1,explain:"Simple effects isolate each level of one factor and test the other factor within it — appropriate when interaction is present."},
      {q:"<code>pairs(emmeans(m, ~F1 | F2), adjust=\"tukey\")</code> does what?",options:["A) Tests F1 overall (ignoring F2)","B) Computes pairwise comparisons of F1 levels WITHIN each level of F2, with Tukey adjustment","C) Fits a new model","D) Plots the data"],correct:1,explain:"The | operator requests within-level comparisons; it's the go-to call when interaction is significant."},
      {q:"ANOVA assumptions include:",options:["A) Binary response","B) Normally distributed residuals, equal variance across cells, independent observations","C) A large number of predictors","D) The response must be a count"],correct:1,explain:"These three parametric assumptions are shared with regression. Check with plot(model) and Levene/Bartlett tests."},
      {q:"If interaction is NOT significant, the recommended approach is:",options:["A) Still interpret simple effects","B) Refit with the additive model <code>aov(Y ~ F1 + F2)</code> and interpret main effects with post-hoc tests","C) Remove F1","D) Increase sample size"],correct:1,explain:"Dropping a non-significant interaction yields a simpler, more powerful test of the main effects."},
      {q:"The interaction term <code>F1:F2</code> represents:",options:["A) F1 + F2","B) That the effect of F1 depends on the level of F2 (and vice versa)","C) A control variable","D) The intercept"],correct:1,explain:"Interaction = differential effect: the F1 effect is NOT the same at every level of F2."},
      {q:"Which function lets you visually check for interaction?",options:["A) hist()","B) <code>interaction.plot(F1, F2, Y)</code>","C) boxplot()","D) pairs()"],correct:1,explain:"interaction.plot plots mean Y across F1, with separate lines per F2 level. Non-parallel lines suggest interaction."},
      {q:"In a balanced two-way design, balanced means:",options:["A) Equal sample sizes in each cell (each F1×F2 combination has the same n)","B) The data are normally distributed","C) Equal means","D) Equal variances"],correct:0,explain:"Balanced = equal n per cell. It simplifies sums-of-squares partitioning and makes Type I = Type III SS."},
      {q:"aov() vs lm() for ANOVA data:",options:["A) They give totally different results","B) aov() is a wrapper around lm() tailored for ANOVA output (Type I SS); for balanced designs both yield equivalent inference","C) lm() cannot handle factors","D) aov() only works for one-way ANOVA"],correct:1,explain:"aov() calls lm() internally. summary(aov) gives the classical ANOVA table; summary(lm) shows coefficient-level output."},
      {q:"plot(aov_fit) diagnostic plots check:",options:["A) The same residual assumptions as regression (normality, constant variance, leverage)","B) The number of observations","C) The design matrix rank","D) The p-values"],correct:0,explain:"Same diagnostic panels as lm(): Residuals vs Fitted, Q-Q, Scale-Location, Residuals vs Leverage."},
      {q:"Which adjustment is MOST conservative for multiple comparisons?",options:["A) None (raw p-values)","B) Bonferroni (p × number of tests)","C) Holm","D) BH (FDR)"],correct:1,explain:"Bonferroni is the most conservative: multiplies p-values by the number of comparisons. Holm and BH are typically less strict."},
      {q:"ANOVA compares:",options:["A) Proportions across groups","B) Group MEANS of a continuous response","C) Medians only","D) Variances only"],correct:1,explain:"ANOVA tests differences in means across groups (using variances in the calculation)."},
      {q:"A Mean Square in an ANOVA table is:",options:["A) The sum of all residuals","B) Sum of Squares divided by degrees of freedom (SS/df) for that source","C) The mean response","D) The geometric mean"],correct:1,explain:"Mean Square = SS/df. F = MS_factor / MS_residual."},
      {q:"When the interaction is significant, TukeyHSD on the combined factor levels is called:",options:["A) A simple effects analysis","B) A cell-means comparison (<code>TukeyHSD(aov(Y~F1:F2))</code>-style)","C) An identity test","D) A one-sample test"],correct:1,explain:"You can compare all cell combinations directly; emmeans with | is an equivalent, cleaner approach."},
      {q:"Why fit the interaction model FIRST, even when you suspect no interaction?",options:["A) Because additive models are biased","B) To test the interaction formally; only drop it if non-significant (data-driven decision)","C) To double the sample size","D) Because aov() requires it"],correct:1,explain:"Fitting the interaction first lets you test H0: no interaction. If not rejected, refit without it for simpler main-effects interpretation."}
    ],
    bonus: [
      {q:"Interpret this ANOVA table:",output:"##           Df Sum Sq Mean Sq F value  Pr(>F)\n## F1         2  248.0  124.00   12.40  0.0002\n## F2         3  410.0  136.67   13.67 4.1e-06\n## F1:F2      6   65.0   10.83    1.08  0.3890\n## Residuals 72  720.0   10.00",options:["A) Interpret the interaction (p=0.389 → significant)","B) Interaction NOT significant; refit additive model and interpret F1 and F2 main effects (both sig, p<0.05)","C) All effects are non-significant","D) Only F1:F2 is significant"],correct:1,explain:"Interaction p=0.389 (not sig). Both main effects are significant (p<0.001). Drop interaction and interpret F1, F2 directly."},
      {q:"TukeyHSD for F1 returns: A-B (p=0.001), A-C (p=0.021), B-C (p=0.540). Which pairs differ significantly at α=0.05?",options:["A) All three pairs","B) A-B and A-C","C) Only A-B","D) None"],correct:1,explain:"A-B and A-C have adj p < 0.05 (reject); B-C does not (fail to reject). Only A-B and A-C differ."},
      {q:"<code>emmeans(m, ~F1 | F2=\"low\")</code> output shows F1 levels 'a' and 'b' differ with p=0.007. This is a:",options:["A) Main effect","B) Simple effect of F1 within F2=low","C) Marginal effect across all F2","D) Residual effect"],correct:1,explain:"Using | F2=\"low\" restricts the comparison of F1 levels to that single F2 level → simple effect."},
      {q:"An interaction plot shows two lines that cross sharply. What does this imply?",options:["A) No interaction","B) Strong interaction: the ordering of F2 levels reverses across F1 → effect of F1 depends heavily on F2","C) Main effects are zero","D) Data are missing"],correct:1,explain:"Crossing lines = reversal = strong qualitative interaction. Main effects are meaningless on their own here."},
      {q:"An ANOVA table shows F1 df=2, Residuals df=57. How many total observations were there?",options:["A) 57","B) 60 (df_total = df_factors + df_residual = 2 + df_F2... assume total df = N−1)","C) Cannot tell from this info alone","D) 2"],correct:2,explain:"You need the complete df breakdown of every factor. Given only F1 and Residuals, you cannot recover N without the other factor's df."}
    ],
    prof: [
      {q:"Two-way ANOVA is used to analyze:",options:["A) One categorical variable","B) Two categorical variables","C) One continuous variable","D) Two continuous variables"],correct:1,explain:"Two-way ANOVA studies the effect of TWO categorical factors on a continuous response."},
      {q:"The dependent variable in ANOVA must be:",options:["A) Categorical","B) Binary","C) Continuous","D) Ordinal"],correct:2,explain:"ANOVA requires a continuous response variable."},
      {q:"Independent variables in two-way ANOVA are also called:",options:["A) Residuals","B) Factors","C) Responses","D) Outcomes"],correct:1,explain:"The categorical predictors are called factors."},
      {q:"Each factor in ANOVA consists of:",options:["A) Coefficients","B) Levels","C) Residuals","D) Means"],correct:1,explain:"Factors have levels (categories)."},
      {q:"The main effect of a factor refers to:",options:["A) Its interaction with another factor","B) Its independent effect on the response","C) Its variance","D) Its residuals"],correct:1,explain:"Individual impact of one factor, ignoring others."},
      {q:"An interaction effect occurs when:",options:["A) Factors are independent","B) One factor affects the response differently at different levels of another factor","C) Variance is constant","D) Data is normally distributed"],correct:1,explain:"Interaction = effect of one factor depends on another."},
      {q:"In a model with interaction, the equation includes:",options:["A) Only main effects","B) Only interaction terms","C) Main effects and interaction term","D) No predictors"],correct:2,explain:"The model includes both main effects and their interaction."},
      {q:"If there is no interaction, the model assumes:",options:["A) Factors are dependent","B) Effects are additive","C) Effects are multiplicative","D) Data is categorical"],correct:1,explain:"Without interaction, effects are additive."},
      {q:"A significant interaction implies:",options:["A) Main effects are irrelevant","B) Effects should be interpreted separately","C) Main effects depend on each other","D) Model is invalid"],correct:2,explain:"Interpretation must consider combined effects, not just main effects."},
      {q:"In interaction plots, parallel lines indicate:",options:["A) Strong interaction","B) No interaction","C) Random noise","D) High variance"],correct:1,explain:"Parallel lines suggest no interaction."},
      {q:"Non-parallel lines in an interaction plot suggest:",options:["A) No relationship","B) Interaction effect","C) Constant variance","D) Independence"],correct:1,explain:"Non-parallel lines indicate interaction between factors."},
      {q:"The ANOVA F-test compares:",options:["A) Means only","B) Variance between groups vs within groups","C) Residuals only","D) Probabilities"],correct:1,explain:"Compares between-group variance to within-group variance."},
      {q:"A large F-statistic indicates:",options:["A) No effect","B) Strong evidence against null hypothesis","C) Small sample size","D) High variance"],correct:1,explain:"A large F suggests significant differences between group means."},
      {q:"The null hypothesis for a main effect is:",options:["A) All group means differ","B) At least one mean differs","C) All group means are equal","D) Interaction exists"],correct:2,explain:"H₀: no difference among group means."},
      {q:"The null hypothesis for interaction is:",options:["A) Interaction exists","B) No interaction effect","C) Means differ","D) Variance is zero"],correct:1,explain:"H₀: no interaction between factors."},
      {q:"Degrees of freedom in ANOVA depend on:",options:["A) Number of predictors and observations","B) Only sample size","C) Only number of groups","D) Only variance"],correct:0,explain:"They depend on sample size AND number of groups/factors."},
      {q:"A p-value less than α indicates:",options:["A) Accept null hypothesis","B) Reject null hypothesis","C) Increase variance","D) Reduce sample size"],correct:1,explain:"p < α → reject H₀."},
      {q:"ANOVA assumes:",options:["A) Non-normality","B) Independence, normality, equal variance","C) Only independence","D) Only normality"],correct:1,explain:"Key assumptions: normality, independence, homogeneity of variance."},
      {q:"Homogeneity of variance means:",options:["A) Means are equal","B) Variances are equal across groups","C) Residuals are zero","D) Data is independent"],correct:1,explain:"Equal variance across groups."},
      {q:"If assumptions are violated, results may be:",options:["A) More accurate","B) Unaffected","C) Unreliable","D) Deterministic"],correct:2,explain:"Violations can lead to incorrect conclusions."}

  logistic: {
    name: "Logistic Regression",
    base: [
      {q:"Logistic regression's link function is:",options:["A) Identity","B) Logit: log(p/(1−p))","C) Log","D) Probit (always)"],correct:1,explain:"Logistic uses the logit link. Log is Poisson. Identity is linear. Probit is a different family."},
      {q:"Correct R call for logistic regression:",options:["A) <code>lm(Y ~ X, data=d)</code>","B) <code>glm(Y ~ X, family=binomial, data=d)</code>","C) <code>glm(Y ~ X, family=poisson, data=d)</code>","D) <code>aov(Y ~ X)</code>"],correct:1,explain:"family=binomial gives logistic regression by default (logit link)."},
      {q:"If β₁ = 0.4 in a logistic model, then exp(0.4) ≈ 1.49 is the:",options:["A) Probability of Y=1","B) Odds ratio: the odds of Y=1 multiply by 1.49 per 1-unit increase in X","C) Predicted count","D) Confidence interval width"],correct:1,explain:"In logistic, exp(coef) = odds ratio. It's NOT a probability or count."},
      {q:"95% CI for an odds ratio is (0.84, 1.22). You conclude:",options:["A) The predictor is significant","B) CI contains 1 → predictor NOT significant at α=0.05","C) The predictor is a confounder","D) The test failed"],correct:1,explain:"For ORs, 1 = no effect. CI containing 1 ⇔ p > 0.05."},
      {q:"<code>predict(fit, newdata)</code> WITHOUT specifying type gives:",options:["A) Probabilities","B) Log-odds (link scale) — this is the default and a common exam pitfall","C) Class labels","D) Odds ratios"],correct:1,explain:"Default type=\"link\" returns log-odds. For probabilities, you must pass type=\"response\"."},
      {q:"The default classification threshold in logistic regression is:",options:["A) 0.05","B) 0.50 (can be tuned)","C) 1.00","D) 0.00"],correct:1,explain:"p ≥ 0.5 → 1, else 0. Lowering the threshold increases sensitivity (more Y=1 predictions)."},
      {q:"Which is NOT a logistic regression assumption?",options:["A) Linearity between X and log-odds","B) Independence of observations","C) Normally distributed residuals","D) No severe multicollinearity"],correct:2,explain:"Logistic does NOT require normal residuals or homoscedasticity — those are linear-regression assumptions."},
      {q:"The logit function is:",options:["A) p = exp(η)/(1+exp(η))","B) log(p/(1−p))","C) 1/p","D) √p"],correct:1,explain:"Logit maps probability (0,1) to all of ℝ. The inverse is the logistic/sigmoid: p = exp(η)/(1+exp(η))."},
      {q:"Null deviance vs residual deviance:",options:["A) Null = best-fit model; Residual = intercept only","B) Null = intercept-only; Residual = with predictors; big DROP → predictors improve fit","C) They are always equal","D) Residual > null means overfit"],correct:1,explain:"Both measure lack of fit. A large drop indicates predictors add explanatory value."},
      {q:"The Likelihood Ratio Test (LRT) for nested logistic models uses:",options:["A) <code>anova(fit1, fit2, test=\"F\")</code>","B) <code>anova(reduced, full, test=\"Chisq\")</code>","C) <code>t.test(fit1, fit2)</code>","D) <code>summary(fit)</code>"],correct:1,explain:"LRT uses χ² for GLMs: 2×(logLik_full − logLik_reduced) ~ χ²(Δdf)."},
      {q:"Wald test vs. Likelihood Ratio Test for a single coefficient:",options:["A) Wald is always better","B) Both test the same null; LRT is generally preferred for small samples or extreme probabilities","C) They produce identical p-values","D) LRT is only for linear regression"],correct:1,explain:"Wald tests z² = (β/SE)². LRT compares likelihoods directly and is usually more accurate in small samples."},
      {q:"AIC can compare:",options:["A) Only nested models","B) Any models fit to the same data (nested or non-nested); lower is better","C) Only linear regressions","D) Only Poisson regressions"],correct:1,explain:"AIC requires the same dataset but does NOT require nesting. LRT requires nested models."},
      {q:"A confusion matrix has TP=40, TN=300, FP=20, FN=10. Accuracy is:",options:["A) 85%","B) 91.9% ((40+300)/(40+300+20+10) = 340/370)","C) 80%","D) Cannot compute"],correct:1,explain:"Accuracy = (TP+TN)/total = 340/370 ≈ 0.919."},
      {q:"In that same confusion matrix, sensitivity is:",options:["A) TP/(TP+FP) = 40/60 ≈ 0.667","B) TP/(TP+FN) = 40/50 = 0.80","C) TN/(TN+FP) = 300/320","D) FP/(FP+TN)"],correct:1,explain:"Sensitivity = true positive rate = TP/(TP+FN). Catches proportion of actual positives."},
      {q:"Specificity in the same matrix is:",options:["A) 0.667","B) 0.80","C) TN/(TN+FP) = 300/320 = 0.9375","D) 0.50"],correct:2,explain:"Specificity = TN/(TN+FP) = true negative rate."},
      {q:"The ROC curve plots:",options:["A) Accuracy vs threshold","B) Sensitivity (y) vs 1 − Specificity (x), traced over all thresholds","C) FP vs FN counts","D) β vs SE"],correct:1,explain:"ROC = TPR vs FPR. AUC summarizes it; 0.5 = random, 1.0 = perfect."},
      {q:"AUC = 0.82 means:",options:["A) The model is wrong 82% of the time","B) For a random positive and random negative, the model scores the positive higher 82% of the time (good discrimination)","C) 82% of predictions are correct","D) Threshold must be 0.82"],correct:1,explain:"AUC = P(score_positive > score_negative). >0.8 = good; 0.7-0.8 fair; 0.5 random."},
      {q:"Given β₀=−1, β₁=0.5, X=4 → η = 1. The predicted probability is:",options:["A) 0.27","B) 0.50","C) exp(1)/(1+exp(1)) ≈ 0.731","D) 1.0"],correct:2,explain:"p = exp(1)/(1+exp(1)) = 2.718/3.718 ≈ 0.731 → predict class 1 at threshold 0.5."},
      {q:"Odds ratio of 0.4 for a predictor means:",options:["A) 40% increase in odds","B) Odds are MULTIPLIED by 0.4 per 1-unit increase → a 60% reduction in odds","C) Probability drops by 0.4","D) Not interpretable"],correct:1,explain:"OR < 1 ⇒ odds decrease. OR=0.4 ⇒ (1−0.4)=0.6 = 60% reduction in odds per unit X."},
      {q:"Before logistic modeling, the binary response Y should:",options:["A) Be left as numeric 0/1 ONLY","B) Ideally be factored (<code>factor(Y)</code>) so R treats levels consistently — either is acceptable but factoring makes the reference level explicit","C) Be standardized","D) Be log-transformed"],correct:1,explain:"Both factored and numeric 0/1 work. Factor form makes the reference level (0) obvious."}
    ],
    bonus: [
      {q:"Coefficients β₀=−4, β₁(hours)=1.5. For a student with 3 hours, what is the predicted probability of passing?",options:["A) 0.23","B) exp(0.5)/(1+exp(0.5)) ≈ 0.62","C) 0.50","D) 0.95"],correct:1,explain:"η = −4 + 1.5(3) = 0.5; p = e^0.5/(1+e^0.5) ≈ 0.62."},
      {q:"Confusion matrix: Pred0/Actual0=180, Pred0/Actual1=30, Pred1/Actual0=20, Pred1/Actual1=70. Sensitivity?",options:["A) 0.70","B) TP/(TP+FN) = 70/100 = 0.70","C) 0.90","D) 0.50"],correct:1,explain:"Sensitivity = TP/(TP+FN). TP=70 (pred1, act1), FN=30 (pred0, act1). 70/(70+30) = 0.70."},
      {q:"Model A: AUC=0.91. Model B: AUC=0.74. Model C: AUC=0.55. Choose the best:",options:["A) Model C","B) Model A (highest AUC = best discrimination)","C) Model B","D) Tie between A and B"],correct:1,explain:"Higher AUC = better class separation. A>B>C. Note AUC is threshold-independent."},
      {q:"Output: OR for smoker = 2.75 (95% CI: 1.80, 4.20), p<0.001. Conclude:",options:["A) Smoking has no effect","B) Smokers have ~2.75× higher odds of the outcome; CI excludes 1, highly significant","C) Smoking reduces the outcome","D) OR cannot be interpreted"],correct:1,explain:"OR > 1 and CI excludes 1 → significant positive association."},
      {q:"Null dev=450, Residual dev=187, Δdf=2. LRT statistic and conclusion:",options:["A) LRT = 187; p ≈ 1","B) LRT = 450 − 187 = 263 on 2 df → p ≈ 0 (predictors jointly highly significant)","C) LRT cannot be computed","D) LRT = 0"],correct:1,explain:"LRT = null_dev − res_dev on Δdf. 263 on 2 df is astronomically significant (χ²)."}
    ],
    prof: [
      {q:"Logistic regression is used when the response variable is:",options:["A) Continuous","B) Count-based","C) Binary","D) Time-dependent"],correct:2,explain:"Used when the outcome is binary (0/1, yes/no)."},
      {q:"The output of logistic regression represents:",options:["A) Raw values","B) Probabilities","C) Counts","D) Residuals"],correct:1,explain:"It models the probability of an event occurring."},
      {q:"Why can't we use linear regression for binary outcomes?",options:["A) Too many variables","B) Predictions can fall outside [0,1]","C) It is too slow","D) It requires normalization"],correct:1,explain:"Linear regression may produce invalid probabilities (<0 or >1)."},
      {q:"Logistic regression uses which function to map values to probabilities?",options:["A) Linear function","B) Exponential function","C) Logistic (sigmoid) function","D) Square function"],correct:2,explain:"The sigmoid function maps values to the range (0,1)."},
      {q:"The logistic function has what shape?",options:["A) Linear","B) U-shaped","C) S-shaped","D) Exponential"],correct:2,explain:"The sigmoid curve is S-shaped, transitioning smoothly between 0 and 1."},
      {q:"The logit transformation is:",options:["A) log(p)","B) log(1 − p)","C) log(p / (1 − p))","D) p / (1 − p)"],correct:2,explain:"The logit is the log of the odds."},
      {q:"Logistic regression models:",options:["A) Probability directly","B) Log odds of probability","C) Variance","D) Residuals"],correct:1,explain:"Models log odds (logit) as a linear function of predictors."},
      {q:"The logistic regression equation is:",options:["A) p = β0 + β1X","B) log(p) = β0 + β1X","C) log(p / (1 − p)) = β0 + β1X","D) p² = β0 + β1X"],correct:2,explain:"Logit model form."},
      {q:"Odds are defined as:",options:["A) p²","B) p − 1","C) p / (1 − p)","D) 1 − p"],correct:2,explain:"Odds compare the probability of success to failure."},
      {q:"If p = 0.8, the odds are:",options:["A) 0.25","B) 0.8","C) 4","D) 5"],correct:2,explain:"Odds = 0.8 / 0.2 = 4."},
      {q:"exp(β) in logistic regression represents:",options:["A) Probability","B) Variance","C) Odds ratio","D) Residual"],correct:2,explain:"exp(β) gives the multiplicative change in odds."},
      {q:"If exp(β) = 2, the odds:",options:["A) Double","B) Halve","C) Stay the same","D) Become zero"],correct:0,explain:"Odds are multiplied by 2."},
      {q:"If exp(β) = 0.5, the odds:",options:["A) Double","B) Halve","C) Stay the same","D) Increase"],correct:1,explain:"Odds are reduced by half."},
      {q:"Logistic regression coefficients are estimated using:",options:["A) Least squares","B) Maximum likelihood estimation","C) Gradient descent only","D) PCA"],correct:1,explain:"The model is fit using MLE."},

      {q:"The deviance in logistic regression measures:",options:["A) Accuracy","B) Distance between models","C) Model fit (similar to RSS)","D) Variance"],correct:2,explain:"Deviance is analogous to RSS for logistic models."},
      {q:"Lower deviance indicates:",options:["A) Worse model","B) Better model fit","C) Larger variance","D) Overfitting"],correct:1,explain:"Lower deviance → better fit to data."},
      {q:"A confusion matrix is used to evaluate:",options:["A) Regression models","B) Classification performance","C) Variance","D) Correlation"],correct:1,explain:"Summarizes prediction vs actual classifications."},
      {q:"Accuracy is defined as:",options:["A) TP / FP","B) (TP + TN) / Total","C) FP / Total","D) FN / Total"],correct:1,explain:"Correct predictions / total predictions."},
      {q:"A key limitation of logistic regression is:",options:["A) Cannot handle binary data","B) Assumes linear relationship in log odds","C) Requires large variance","D) Cannot estimate probabilities"],correct:1,explain:"Assumes linear relationship between predictors and log odds."}

  poisson: {
    name: "Poisson Regression",
    base: [
      {q:"Poisson regression uses which link function?",options:["A) Identity","B) Logit","C) Log: log(μ) = β₀ + β₁X","D) Probit"],correct:2,explain:"Log link ensures predicted μ > 0, appropriate for counts."},
      {q:"Correct R call:",options:["A) <code>lm(Y ~ X)</code>","B) <code>glm(Y ~ X, family=binomial)</code>","C) <code>glm(Y ~ X, family=poisson, data=d)</code>","D) <code>aov(Y ~ X)</code>"],correct:2,explain:"family=poisson uses the log link by default."},
      {q:"exp(β) in Poisson regression is called the:",options:["A) Odds Ratio","B) Incidence Rate Ratio (IRR) — the multiplicative change in expected count per unit X","C) Hazard Ratio","D) Prior probability"],correct:1,explain:"OR = logistic. IRR = Poisson. HR = Cox. Don't confuse them on the exam."},
      {q:"Residual deviance = 980, df = 200. What does this suggest?",options:["A) The model fits perfectly","B) Deviance/df = 4.9, much greater than 1 → overdispersion","C) Underdispersion","D) Nothing — deviance is meaningless"],correct:1,explain:"Poisson assumes equidispersion (Var=Mean ⇒ deviance/df ≈ 1). Ratio ≫ 1 suggests overdispersion."},
      {q:"When you refit with <code>family=quasipoisson</code>, what changes?",options:["A) Coefficient estimates and SEs both change","B) Coefficients stay the SAME; SEs are inflated by √φ; p-values are larger","C) Link function switches to identity","D) Nothing"],correct:1,explain:"Quasi-Poisson estimates a dispersion parameter φ and scales SEs. Point estimates identical to Poisson."},
      {q:"When overdispersion is severe or structural (e.g., unobserved heterogeneity), prefer:",options:["A) Linear regression","B) Negative Binomial: <code>glm.nb(Y ~ X)</code> from MASS","C) Logistic regression","D) Wilcoxon test"],correct:1,explain:"NB adds a dispersion parameter to the variance function, accommodating heavier tails than Poisson."},
      {q:"An offset <code>offset(log(exposure))</code> is used to:",options:["A) Standardize Y","B) Model a RATE: count per unit exposure (time, population). Its coefficient is fixed at 1 (not estimated)","C) Force a specific intercept","D) Drop a predictor"],correct:1,explain:"Offsets convert count models to rate models by accounting for exposure."},
      {q:"If <code>years</code> is the offset, exp(β) for a predictor is:",options:["A) The odds ratio","B) The rate ratio per unit X — ratio of counts-per-year for a one-unit change in X","C) The probability","D) A mean"],correct:1,explain:"With log(exposure) offset, exp(coef) multiplies the RATE (count per unit exposure), not the count itself."},
      {q:"The key Poisson distributional assumption is:",options:["A) E(Y) = Var(Y) (equidispersion)","B) Y is normal","C) Y is bounded in [0,1]","D) Residuals are independent of fitted values only"],correct:0,explain:"Poisson assumes mean equals variance. If Var > Mean, overdispersion; if Var < Mean (rare), underdispersion."},
      {q:"β₁ = 0.2 in Poisson → IRR = exp(0.2) ≈ 1.22. Interpretation:",options:["A) Count increases by 0.2","B) Count increases by ~22% per 1-unit increase in X (multiplicative)","C) Odds increase by 22%","D) Not interpretable"],correct:1,explain:"Percent change in expected count = (IRR−1)×100% = 22%."},
      {q:"<code>predict(fit, newdata, type=\"response\")</code> in Poisson returns:",options:["A) Log-count","B) Predicted COUNT (μ)","C) Probabilities","D) Log-odds"],correct:1,explain:"type=\"response\" applies the inverse link (exp). For Poisson that gives μ directly."},
      {q:"Why does Poisson use log link rather than identity?",options:["A) Speed of computation","B) log link guarantees μ > 0; identity can yield negative counts","C) Log link is additive in X","D) No particular reason"],correct:1,explain:"Counts must be non-negative; exp() ensures that."},
      {q:"A goodness-of-fit check is:",options:["A) <code>1 − pchisq(deviance, df)</code>; p > 0.05 suggests adequate fit","B) R²","C) AUC","D) Wilcoxon test"],correct:0,explain:"Under a well-fitting Poisson, residual deviance ~ χ²(df). Large p-value → no evidence of lack of fit."},
      {q:"AIC compares Poisson models by:",options:["A) The number of observations","B) Log-likelihood penalized by 2k (parameters); lower is better","C) Squared residuals","D) R²"],correct:1,explain:"AIC = −2 log-lik + 2k. Same rule for Poisson, logistic, and linear models."},
      {q:"Which response type is INAPPROPRIATE for Poisson regression?",options:["A) Number of accidents per month","B) A binary pass/fail variable","C) Count of emails received","D) Crimes reported per region"],correct:1,explain:"Binary outcomes belong in logistic regression. Poisson is for counts (0,1,2,…)."},
      {q:"Common cause of overdispersion:",options:["A) Unobserved heterogeneity or clustering/correlated events","B) Too many observations","C) A very small sample","D) Categorical predictors"],correct:0,explain:"If subjects differ in unobserved ways, variability exceeds what the Poisson model allows."},
      {q:"Quasi-Poisson vs Negative Binomial:",options:["A) They are identical","B) Quasi keeps Poisson mean/variance ratio but inflates SEs; NB reparameterizes the variance function (Var = μ + θμ²) — NB is likelihood-based while quasi is quasi-likelihood","C) Only NB provides predictions","D) Quasi cannot handle overdispersion"],correct:1,explain:"Both handle overdispersion but via different mechanisms. NB has a proper likelihood; quasi is quasi-likelihood."},
      {q:"glm.nb() is located in which R package?",options:["A) stats (base)","B) MASS","C) glmnet","D) dplyr"],correct:1,explain:"library(MASS); glm.nb(...). Same formula interface as glm."},
      {q:"Linear vs Logistic vs Poisson, the Y type:",options:["A) continuous / binary / count","B) continuous / count / binary","C) binary / continuous / continuous","D) count / count / count"],correct:0,explain:"lm → continuous. glm(binomial) → binary. glm(poisson) → count."},
      {q:"If counts are all small (e.g., 0,1,2) with zero-inflation, which model is a better starting point than plain Poisson?",options:["A) Linear regression","B) Zero-inflated Poisson or Negative Binomial","C) Logistic with threshold 0.5","D) Wilcoxon"],correct:1,explain:"Excess zeros violate Poisson. ZIP/ZINB models are designed for that pattern."}
    ],
    bonus: [
      {q:"Output: β_age = −0.028, SE=0.006. IRR for age and interpretation:",options:["A) IRR = 0.028; count decreases by 0.028 per year","B) IRR = exp(−0.028) ≈ 0.972; each extra year is associated with ~2.8% FEWER counts, holding others constant","C) IRR = −0.028","D) Cannot compute without deviance"],correct:1,explain:"IRR = exp(coef). exp(−0.028) ≈ 0.972 → 2.8% decrease per year."},
      {q:"Residual deviance=246 on df=98. What's the dispersion ratio and conclusion?",options:["A) 2.51 → overdispersion; consider quasi-Poisson or NB","B) 0.40 → underdispersion","C) 1.0 → equidispersion","D) Cannot tell"],correct:0,explain:"246/98 ≈ 2.51, well above 1. Indicates overdispersion."},

    name: "PCA & PCR",
    base: [
      {q:"<code>prcomp(X, center=TRUE, scale.=TRUE)</code> is important because:",options:["A) center alone is enough","B) Without scale.=TRUE, variables with larger numeric ranges dominate the PCs","C) scale.=TRUE removes NAs","D) It forces orthogonality"],correct:1,explain:"prcomp does NOT auto-scale. Variance-dominance from raw scale is the #1 PCA pitfall."},
      {q:"PCA is:",options:["A) Supervised","B) UNSUPERVISED — uses only X, not Y","C) A classification method","D) A causal inference technique"],correct:1,explain:"PCA maximizes variance in X. It never uses Y, which is why PCR has a known weakness."},
      {q:"The eigenvalue of a PC equals:",options:["A) Correlation with Y","B) VARIANCE captured by that PC","C) Number of variables","D) The loading sum"],correct:1,explain:"Eigenvalue = variance along the PC's direction. Sum of all eigenvalues = total variance."},
      {q:"Loadings in PCA are:",options:["A) Weights that express each PC as a linear combination of original variables","B) p-values","C) Residuals","D) Data after scaling"],correct:0,explain:"pca$rotation gives loadings — the coefficients of original variables."},
      {q:"Scores in PCA are:",options:["A) Eigenvalues","B) The observations projected onto the PC axes (pca$x)","C) Residuals from regression","D) p-values"],correct:1,explain:"Scores are the transformed coordinates of observations in PC space."},
      {q:"A scree plot helps by:",options:["A) Showing the ELBOW where additional PCs add little variance","B) Testing normality","C) Replacing the biplot","D) Computing Y"],correct:0,explain:"Plot eigenvalues vs PC index and pick K at the elbow."},
      {q:"Common cumulative-variance thresholds for choosing K:",options:["A) 0.50","B) 0.80–0.90","C) 0.99","D) 0.10"],correct:1,explain:"Retain enough PCs to capture 80–90% of total variance."},
      {q:"Kaiser criterion says:",options:["A) Keep PCs with eigenvalue > 1","B) Keep PCs with eigenvalue < 1","C) Keep all PCs","D) Drop all PCs"],correct:0,explain:"On a standardized correlation matrix, average eigenvalue = 1. Keeping those above 1 retains above-average PCs."},
      {q:"In a biplot, two variable arrows pointing in OPPOSITE directions mean:",options:["A) Uncorrelated","B) Positively correlated","C) NEGATIVELY correlated","D) Equal loadings"],correct:2,explain:"Same direction = positive; 90° = uncorrelated; opposite = negative."},
      {q:"Two arrows at ~90° in a biplot indicate:",options:["A) Strong positive correlation","B) Approximately UNCORRELATED variables","C) Strong negative correlation","D) Missing data"],correct:1,explain:"Angle between arrows reflects correlation: cos(angle). 90° → cos=0 → uncorrelated."},
      {q:"PCR differs from Ridge/Lasso in that:",options:["A) PCR is a 2-step method (PCA then OLS); Ridge/Lasso directly optimize for predicting Y","B) PCR handles categorical Y","C) PCR uses L1 penalty","D) They are identical"],correct:0,explain:"PCR selects components without regard to Y; Ridge/Lasso penalize coefficients while fitting Y."},
      {q:"KEY limitation of PCR:",options:["A) It cannot run in R","B) PCs selected by variance in X may be unrelated to Y → may miss predictive information","C) PCR requires binary Y","D) PCR is only for p<n"],correct:1,explain:"This is the fundamental misalignment — unsupervised variance vs. supervised prediction."},
      {q:"PCR with ncomp = p (all components) is equivalent to:",options:["A) Ridge regression","B) OLS — no dimensionality reduction benefit","C) A random model","D) Lasso"],correct:1,explain:"All PCs span the same space as the original predictors; the fit is the same as OLS."},
      {q:"PCs are orthogonal, meaning:",options:["A) They have the same magnitude","B) They are UNCORRELATED, eliminating multicollinearity in PCR","C) They are missing","D) They are identical"],correct:1,explain:"Orthogonality ⇒ zero covariance. This is why PCR avoids multicollinearity."},
      {q:"PCA addresses multicollinearity by:",options:["A) Dropping correlated variables","B) Replacing correlated predictors with uncorrelated components","C) Adding a penalty","D) Increasing sample size"],correct:1,explain:"Transformation to uncorrelated axes sidesteps the instability of correlated predictors."},
      {q:"To find the most influential variables on PC1:",options:["A) Report the largest variance","B) Report variables with the largest |loading| in PC1","C) Use Y directly","D) Use R²"],correct:1,explain:"Sort |pca$rotation[,1]| in decreasing order."},
      {q:"The first principal component (PC1) captures:",options:["A) Any arbitrary direction","B) The direction of MAX variance in the predictor space","C) The direction maximally correlated with Y","D) Errors"],correct:1,explain:"PC1 is the direction of max variance; PC2 is the direction of max variance orthogonal to PC1; and so on."},
      {q:"<code>center=TRUE</code> in prcomp:",options:["A) Normalizes to unit variance","B) Subtracts the column means before decomposition","C) Rotates the data","D) Removes NA rows"],correct:1,explain:"Centering (mean-subtraction) is standard. Scale.=TRUE additionally divides by each column's SD."},
      {q:"Which package has <code>pcr()</code> for Principal Component Regression?",options:["A) glmnet","B) pls","C) stats (base)","D) car"],correct:1,explain:"library(pls); pcr(Y ~ ., data=train, scale=TRUE, validation=\"CV\")."},
      {q:"<code>validationplot(pcr_fit, val.type=\"MSEP\")</code> helps you:",options:["A) Check residual normality","B) Choose ncomp by visualizing CV prediction error vs # components","C) Fit OLS","D) Diagnose leverage"],correct:1,explain:"Pick the ncomp where MSEP begins to plateau or reaches its minimum."}
    ],
    bonus: [
      {q:"prop. var explained:\nPC1=0.42  PC2=0.28  PC3=0.14  PC4=0.08  PC5=0.05\nCumulative:\nPC1=0.42  PC2=0.70  PC3=0.84  PC4=0.92  PC5=0.97\nHow many PCs at 80% threshold?",options:["A) 2","B) 3 (cumulative 0.84 first exceeds 0.80)","C) 4","D) 5"],correct:1,explain:"Retain the smallest k whose cumulative variance ≥ 0.80. Here k=3 gives 0.84."},
      {q:"PC1 loadings: Height=0.52, Weight=0.48, Age=0.02, Income=0.05. PC1 primarily captures:",options:["A) Income","B) Body size (Height and Weight dominate)","C) Age","D) Error"],correct:1,explain:"Large |loadings| on Height and Weight with tiny loadings on Age/Income → a 'size' dimension."},
      {q:"Scree plot shows a sharp elbow at PC3 then flat. You should retain:",options:["A) 1","B) ~3 components (elbow rule)","C) All","D) 0"],correct:1,explain:"Elbow at PC3 suggests the first 3 components capture most structure."},
      {q:"MSEP curve bottoms out at ncomp = 7, fluctuates slightly, then rises. Choose ncomp:",options:["A) 1","B) 7 (minimum MSEP / plateau)","C) 20","D) 0"],correct:1,explain:"Pick ncomp at or near the minimum MSEP, balancing complexity and error."},
      {q:"Biplot: Var A arrow at 0°, Var B arrow at 180°, Var C arrow at 90° (relative to A). Relationships?",options:["A) A-B uncorrelated; A-C positive","B) A-B strongly NEGATIVELY correlated; A-C approximately UNCORRELATED","C) A-B positive; B-C negative","D) All uncorrelated"],correct:1,explain:"180° = opposite direction = strong negative correlation. 90° = cos(90°)=0 = uncorrelated."}
    ],
    prof: [
      {q:"What is the main purpose of PCA?",options:["A) Predict a response variable","B) Classify observations","C) Reduce dimensionality","D) Estimate probabilities"],correct:2,explain:"PCA reduces dimensionality while retaining important information."},
      {q:"PCA is most useful when variables are:",options:["A) Independent","B) Binary","C) Highly correlated","D) Normally distributed"],correct:2,explain:"Designed to handle correlated variables and redundancy."},
      {q:"Principal components are:",options:["A) Nonlinear transformations","B) Linear combinations of original variables","C) Subsets of variables","D) Residuals"],correct:1,explain:"Each PC is a linear combination of the original variables."},
      {q:"Principal components are:",options:["A) Correlated","B) Independent and uncorrelated","C) Random","D) Binary"],correct:1,explain:"PCs are orthogonal (uncorrelated)."},
      {q:"The first principal component (PC1) captures:",options:["A) Least variance","B) Mean","C) Maximum variance","D) Median"],correct:2,explain:"PC1 captures the largest variation in the data."},
      {q:"The second principal component (PC2) must be:",options:["A) Larger than PC1","B) Correlated with PC1","C) Orthogonal to PC1","D) Equal to PC1"],correct:2,explain:"PC2 is uncorrelated with PC1."},
      {q:"PCA finds directions that:",options:["A) Minimize variance","B) Maximize variance","C) Minimize error","D) Maximize correlation"],correct:1,explain:"Maximizes projected variance."},
      {q:"The variance of projection onto direction a is:",options:["A) a^Ta","B) X^TX","C) a^T S a","D) Sa"],correct:2,explain:"Variance = a^T S a."},
      {q:"PCA directions are given by:",options:["A) Regression coefficients","B) Eigenvectors","C) Residuals","D) Means"],correct:1,explain:"PCs are eigenvectors of the covariance/correlation matrix."},
      {q:"The variance explained by each component is given by:",options:["A) Eigenvectors","B) Residuals","C) Eigenvalues","D) Means"],correct:2,explain:"Eigenvalues measure variance explained."},
      {q:"Why is standardization important in PCA?",options:["A) To remove noise","B) To make variables independent","C) To prevent large-scale variables from dominating","D) To reduce sample size"],correct:2,explain:"Without it, high-variance variables dominate."},
      {q:"After standardization, each variable has:",options:["A) Mean 1, variance 0","B) Mean 0, standard deviation 1","C) Mean 1, variance 1","D) Mean 0, variance 0"],correct:1,explain:"Standardization → mean = 0, SD = 1."},
      {q:"A scree plot is used to:",options:["A) Fit regression models","B) Detect outliers","C) Determine number of components","D) Estimate coefficients"],correct:2,explain:"Identifies the elbow point for retaining components."},
      {q:"The \"elbow\" in a scree plot indicates:",options:["A) Maximum variance","B) Optimal number of components","C) Minimum variance","D) Number of variables"],correct:1,explain:"After the elbow, additional components add little value."},
      {q:"Loadings in PCA represent:",options:["A) Predictions","B) Errors","C) Coefficients of PCs","D) Variances"],correct:2,explain:"Loadings are weights of variables in each PC."},
      {q:"Large absolute loadings indicate:",options:["A) Weak contribution","B) Strong contribution","C) No effect","D) Random effect"],correct:1,explain:"Strong influence on the component."},
      {q:"A scores plot shows:",options:["A) Variable importance","B) Regression coefficients","C) Observations in PC space","D) Error terms"],correct:2,explain:"Plots observations using principal components."},
      {q:"PCA is considered:",options:["A) Supervised learning","B) Unsupervised learning","C) Reinforcement learning","D) Classification"],correct:1,explain:"PCA does not use a response variable."},
      {q:"PCR is used primarily to address:",options:["A) Missing data","B) Multicollinearity","C) Nonlinearity","D) Outliers"],correct:1,explain:"Handles correlated predictors via PCA transformation."},
      {q:"A limitation of PCR is that components are selected based on:",options:["A) Prediction accuracy","B) Correlation with Y","C) Variance in predictors only","D) Sample size"],correct:2,explain:"PCR selects components based on explained variance in X, not predictive power for Y."}
    ]
  },
  regularized: {
    name: "Regularized Regression",
    base: [
      {q:"In glmnet, alpha=0 gives:",options:["A) Lasso","B) Ridge regression (L2 penalty)","C) Elastic Net","D) OLS"],correct:1,explain:"alpha=0 → Ridge; alpha=1 → Lasso; 0<alpha<1 → Elastic Net."},
      {q:"In glmnet, alpha=1 gives:",options:["A) Lasso (L1 penalty, can set coefs to zero)","B) Ridge","C) Elastic Net","D) OLS"],correct:0,explain:"Lasso = L1 penalty. It performs variable selection."},
      {q:"Which performs automatic variable selection?",options:["A) Ridge","B) Lasso (can set coefficients exactly to zero)","C) OLS","D) Any GLM"],correct:1,explain:"The L1 penalty produces exact zeros at corner solutions of the optimization."},
      {q:"Ridge regression:",options:["A) Sets some coefs to zero","B) Shrinks all coefs toward 0 but NEVER exactly to zero (keeps all predictors)","C) Is equivalent to Lasso","D) Has no penalty"],correct:1,explain:"L2 penalty yields non-zero shrunken estimates; no variable selection."},
      {q:"Elastic Net is useful when:",options:["A) Only 1 predictor matters","B) Predictors are correlated AND you want some sparsity; ENet keeps GROUPS of correlated predictors together","C) Data are normal","D) Y is binary"],correct:1,explain:"Combines L1 (select) and L2 (group) — helpful for correlated features."},
      {q:"lambda.min vs lambda.1se from <code>cv.glmnet</code>:",options:["A) lambda.min = largest lambda; lambda.1se = smallest","B) lambda.min = minimum CV error; lambda.1se = largest lambda within 1 SE of min (simpler model)","C) They are identical","D) lambda.min is for Ridge only"],correct:1,explain:"lambda.1se trades a tiny bit of predictive error for a more parsimonious model."},
      {q:"Regularization trades:",options:["A) Both bias and variance up","B) A small increase in bias for a large decrease in variance → lower test MSE","C) Only bias up, nothing else","D) Only variance up"],correct:1,explain:"MSE = bias² + variance. Regularization accepts slightly more bias in exchange for much less variance."},
      {q:"L1 vs L2 penalty:",options:["A) L1 = sum(|βj|), can produce exact zeros; L2 = sum(βj²), produces continuous shrinkage","B) L1 and L2 are identical","C) L2 always gives sparser models","D) Neither penalizes large coefs"],correct:0,explain:"The geometry of the L1 ball creates corners where some β become exactly zero; L2's smooth ball doesn't."},
      {q:"<code>cv.glmnet()</code> returns:",options:["A) Nothing useful","B) A sequence of lambdas + CV error per lambda + lambda.min & lambda.1se","C) OLS coefficients only","D) Predicted probabilities"],correct:1,explain:"Default K=10 CV over the lambda grid; the object stores everything needed."},
      {q:"As lambda → 0, the solution approaches:",options:["A) All coefs zero","B) OLS estimates","C) Ridge with huge shrinkage","D) Lasso with max sparsity"],correct:1,explain:"No penalty → unregularized OLS."},
      {q:"As lambda → ∞, Ridge coefficients:",options:["A) Blow up","B) Shrink toward 0 (but never exactly 0)","C) Stay constant","D) Become exactly 0"],correct:1,explain:"More penalty ⇒ more shrinkage. At ∞, predictions approach the mean of Y (intercept only)."},
      {q:"Why does glmnet require <code>model.matrix()</code> instead of a formula?",options:["A) It handles categorical Y","B) glmnet expects a numeric matrix X; model.matrix expands factors to dummies and drops the intercept column with [,-1]","C) It requires sparse data","D) Formula interface is too slow"],correct:1,explain:"glmnet is matrix-based. Also useful to standardize automatically inside glmnet."},
      {q:"glmnet automatically:",options:["A) Applies one-hot encoding","B) STANDARDIZES columns of X internally (and returns coefs on the original scale)","C) Handles missing data","D) Chooses alpha"],correct:1,explain:"standardize=TRUE by default. Saves you from manually scaling."},
      {q:"Ridge beats Lasso when:",options:["A) Only a few predictors are important (sparse truth)","B) MANY predictors contribute SMALL effects; keeping all with shrinkage works best","C) Data are binary","D) Alpha=1"],correct:1,explain:"No sparse signal → shrinking (not dropping) is better."},
      {q:"Lasso beats Ridge when:",options:["A) Many small effects","B) Only a FEW predictors truly matter (sparse signal); Lasso zeros out the rest and improves interpretability","C) Predictors are strongly correlated","D) Y is categorical"],correct:1,explain:"Under sparsity, selection is both better predictive and more interpretable."},
      {q:"Ridge shrinks grouped correlated predictors, while Lasso:",options:["A) Drops all of them","B) Arbitrarily picks ONE from a correlated group and zeros out the rest (instability with correlated features)","C) Shrinks them all equally","D) Requires one-hot encoding"],correct:1,explain:"Lasso is unstable under correlation. Elastic Net fixes this by keeping the group together."},
      {q:"Comparing models by test MSE on a held-out set:",options:["A) Always favors the simplest model","B) Lower test MSE = better generalization; best across Ridge/Lasso/ENet/OLS is the one to report","C) Uses training data only","D) Ignores lambda"],correct:1,explain:"Always evaluate predictive methods on held-out data."},
      {q:"Why regularize at all?",options:["A) To inflate p-values","B) To prevent OVERFITTING, stabilize coefficients under multicollinearity, and improve test error","C) To force zero residuals","D) To avoid standardization"],correct:1,explain:"Regularization is the go-to remedy for high-dimensional / ill-conditioned regression problems."},
      {q:"The penalty can be viewed as:",options:["A) An extra noise term","B) A constraint on the coefficient norm (L1 or L2 ball) during minimization","C) A test statistic","D) A likelihood"],correct:1,explain:"Equivalent formulations: min RSS s.t. ||β|| ≤ t vs. min(RSS + λ||β||)."},
      {q:"Direction of coefficient shrinkage:",options:["A) Always away from zero","B) Toward zero (shrinkage toward 0)","C) Randomly","D) Toward the mean of Y"],correct:1,explain:"Regularization penalizes large |β|, pulling them toward 0."}
    ],
    bonus: [
      {q:"Ridge MSE=24,500; Lasso MSE=31,200; ENet MSE=25,800; OLS MSE=28,000. Best choice:",options:["A) OLS","B) Ridge (lowest test MSE)","C) Lasso","D) ENet"],correct:1,explain:"Ridge has the lowest MSE. Ridge's superiority suggests many small non-zero effects (no sparsity)."},
      {q:"Lasso coefficients at lambda.min:\nX1=1.2  X2=0.0  X3=0.0  X4=0.8  X5=0.0  X6=-0.3\nHow many predictors were selected?",options:["A) 0","B) 3 (X1, X4, X6 are non-zero)","C) 6","D) 5"],correct:1,explain:"Lasso zeros out X2, X3, X5. Non-zero coefficients count as selected."},
      {q:"cv.glmnet: lambda.min=0.08, lambda.1se=0.25. Lambda.1se implies:",options:["A) The same model as lambda.min","B) A MORE regularized model → fewer predictors, slightly higher CV error, more parsimonious","C) A less regularized model","D) An error"],correct:1,explain:"Larger lambda ⇒ more shrinkage and sparsity; lambda.1se is chosen for parsimony."},
      {q:"CV curve: lowest MSE at log(lambda)=−4; the 1-SE line crosses the curve at log(lambda)=−1. You would use:",options:["A) log(lambda)=−4 (lambda.min) for minimum error; log(lambda)=−1 (lambda.1se) for simpler model","B) log(lambda)=10","C) log(lambda)=−∞","D) Cannot tell"],correct:0,explain:"Standard rule: pick min for accuracy, pick 1se for parsimony."},
      {q:"Ridge MSE=820, Lasso MSE=940, but Lasso dropped 15 of 30 predictors. Your best summary:",options:["A) Lasso is always preferred","B) Ridge wins on accuracy; Lasso wins on INTERPRETABILITY — pick based on goal","C) They are identical","D) Use OLS"],correct:1,explain:"Classic trade-off. Report both; recommend based on whether you need sparsity or minimum error."}
    ],
    prof: [
      {q:"What is the main goal of multiple linear regression?",options:["A) Classify observations","B) Model relationship between response and predictors","C) Reduce dimensionality","D) Estimate probabilities"],correct:1,explain:"Models the relationship between a response and multiple predictors."},
      {q:"Ordinary Least Squares (OLS) estimates coefficients by minimizing:",options:["A) Absolute error","B) Residual sum of squares (RSS)","C) Mean absolute error","D) Variance"],correct:1,explain:"OLS minimizes sum of squared residuals."},
      {q:"The OLS solution is given by:",options:["A) (X^TX + λI)^(-1)X^Ty","B) (X^TX)^(-1)X^Ty","C) X^Ty","D) X^(-1)y"],correct:1,explain:"Closed-form OLS estimator."},
      {q:"Multicollinearity occurs when:",options:["A) Predictors are independent","B) Predictors are highly correlated","C) Response is categorical","D) Errors are large"],correct:1,explain:"Strong correlation among predictors."},
      {q:"Multicollinearity causes:",options:["A) Bias in coefficients","B) Large variance in estimates","C) Smaller datasets","D) Perfect predictions"],correct:1,explain:"Unstable estimates with high variance."},
      {q:"When p is large relative to n, OLS becomes:",options:["A) More accurate","B) Unbiased","C) Unstable","D) Deterministic"],correct:2,explain:"High-dimensional → unstable, prone to overfitting."},
      {q:"Overfitting occurs when:",options:["A) Model is too simple","B) Model fits training data too well but performs poorly on new data","C) Data is missing","D) Predictors are independent"],correct:1,explain:"Poor generalization despite strong training fit."},
      {q:"Regularization adds what to the loss function?",options:["A) Noise","B) Bias only","C) Penalty term","D) Extra predictors"],correct:2,explain:"Regularization adds a penalty on coefficients."},
      {q:"What does λ (lambda) control?",options:["A) Number of predictors","B) Strength of penalty","C) Sample size","D) Error variance"],correct:1,explain:"λ controls the amount of shrinkage."},
      {q:"When λ = 0, regularized regression becomes:",options:["A) Ridge","B) Lasso","C) OLS","D) Elastic Net"],correct:2,explain:"No penalty → OLS."},
      {q:"Increasing λ causes coefficients to:",options:["A) Increase","B) Stay the same","C) Shrink toward zero","D) Become random"],correct:2,explain:"Larger λ → stronger shrinkage."},
      {q:"Regularization primarily reduces:",options:["A) Bias","B) Variance","C) Sample size","D) Predictors"],correct:1,explain:"Reduces variance while slightly increasing bias."},
      {q:"Ridge regression uses which penalty?",options:["A) L1","B) L2","C) L0","D) Log"],correct:1,explain:"Ridge uses L2 (sum of squared coefficients)."},
      {q:"The ridge estimator modifies OLS by adding:",options:["A) λX","B) λy","C) λI","D) λβ"],correct:2,explain:"Ridge adds λI to X^TX to stabilize inversion."},
      {q:"In ridge regression, coefficients:",options:["A) Become zero","B) Stay unchanged","C) Shrink but remain nonzero","D) Become infinite"],correct:2,explain:"Ridge shrinks but does not set to zero."},
      {q:"Lasso regression uses which penalty?",options:["A) L1","B) L2","C) L3","D) Quadratic"],correct:0,explain:"Lasso uses L1 (absolute values)."},
      {q:"A key property of lasso regression is:",options:["A) Always keeps all variables","B) Sets some coefficients exactly to zero","C) Increases variance","D) Removes bias"],correct:1,explain:"Lasso performs automatic variable selection."},
      {q:"When predictors are highly correlated, lasso tends to:",options:["A) Keep all predictors","B) Average coefficients","C) Select one and shrink others","D) Remove all predictors"],correct:2,explain:"Lasso selects one variable and eliminates others from correlated groups."},
      {q:"Elastic Net combines:",options:["A) OLS and PCA","B) L1 and L2 penalties","C) Regression and classification","D) Mean and variance"],correct:1,explain:"Elastic Net = Lasso (L1) + Ridge (L2)."},
      {q:"The bias-variance tradeoff in regularization implies:",options:["A) Both bias and variance decrease","B) Bias increases, variance decreases","C) Bias decreases, variance increases","D) Both increase"],correct:1,explain:"Regularization adds bias but reduces variance."}
    ]
  },
  survival: {
    name: "Survival Analysis",
    base: [
      {q:"Survival analysis is for:",options:["A) Any continuous outcome","B) TIME-TO-EVENT data (possibly censored)","C) Binary outcomes only","D) Count data only"],correct:1,explain:"Y is duration until an event; censoring means some durations aren't fully observed."},
      {q:"Right-censoring occurs when:",options:["A) The event happened before the study started","B) The event has NOT occurred by the subject's end-of-follow-up (or dropout) — true event time is unknown, but known to exceed the observed time","C) Data are missing at random","D) The predictor is missing"],correct:1,explain:"The most common form of censoring in clinical / engineering studies."},
      {q:"In survival data, status = 1 means:",options:["A) The subject was censored","B) The EVENT was observed","C) Missing data","D) The subject was excluded"],correct:1,explain:"status=1 event, status=0 censored (convention)."},
      {q:"The survival function S(t) is:",options:["A) P(T = t)","B) P(T > t) — probability the event has NOT occurred by time t","C) The hazard at time t","D) The mean survival"],correct:1,explain:"S(t)=1−F(t). S(0)=1; S decreases; limit = 0."},
      {q:"S(0) is always:",options:["A) 0","B) 1","C) 0.5","D) Undefined"],correct:1,explain:"At time 0 no events have occurred."},
      {q:"The Kaplan-Meier estimator is a:",options:["A) Parametric exponential model","B) Non-parametric product-limit estimator of S(t)","C) Regression model","D) Mean estimate only"],correct:1,explain:"Computes S as a product of conditional survival probabilities at each event time."},
      {q:"The KM curve is:",options:["A) A smooth curve","B) A STEP function: flat between events, drops at each event time","C) A straight line","D) Continuous and strictly decreasing"],correct:1,explain:"Drops only at observed events; censored observations leave the risk set without a drop."},
      {q:"Median survival time is:",options:["A) The mean time to event","B) The first time t at which S(t) ≤ 0.5","C) The max follow-up time","D) Always the last event"],correct:1,explain:"Use the KM curve's crossing of 0.5. If survival never drops to 0.5, median is undefined."},
      {q:"The log-rank test compares:",options:["A) Means of two groups","B) SURVIVAL CURVES across 2+ groups (H0: S1=S2=...)","C) Hazard functions only at one time","D) Residuals"],correct:1,explain:"Non-parametric test for differences in survival distributions."},
      {q:"Null hypothesis of the log-rank test:",options:["A) All subjects have the same hazard at baseline","B) Survival curves are the SAME across groups","C) The Cox model fits","D) Censoring is uniform"],correct:1,explain:"Under H0 the observed events in each group equal expected events from pooled data."},
      {q:"Cox Proportional Hazards model:",options:["A) h(t|X) = h0(t) + Xβ","B) h(t|X) = h0(t) · exp(β1X1 + ... + βpXp)","C) h(t|X) = Xβ","D) h(t|X) = β0"],correct:1,explain:"Baseline hazard h0(t) is unspecified; covariates act multiplicatively."},
      {q:"The Hazard Ratio (HR) is:",options:["A) h(t|X+1) − h(t|X)","B) exp(β) — multiplicative change in hazard for a 1-unit increase in X","C) Always ≥ 1","D) The p-value"],correct:1,explain:"Analogue of OR (logistic) and IRR (Poisson). HR = exp(coef)."},
      {q:"HR = 1.5 means:",options:["A) 50% lower hazard","B) 50% HIGHER hazard at any time, holding other covariates constant","C) The predictor is not significant","D) Baseline hazard equals 1.5"],correct:1,explain:"(HR−1)×100% = percent change in hazard per 1-unit X."},
      {q:"HR < 1 means:",options:["A) Higher hazard","B) LOWER hazard (protective effect)","C) No effect","D) Infinite hazard"],correct:1,explain:"HR<1 protective; HR=1 no effect; HR>1 harmful."},
      {q:"The Proportional Hazards assumption states:",options:["A) Hazards are identical across groups","B) The hazard RATIO between groups is CONSTANT over time (lines in log scale are parallel)","C) Baseline hazard is zero","D) No covariates are needed"],correct:1,explain:"If PH fails, HR changes over time; stratify, add a time-varying coefficient, or use a different model."},
